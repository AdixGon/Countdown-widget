<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>23 May Countdown</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#05070d">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="background"></div>

<div class="blur blur1"></div>
<div class="blur blur2"></div>

<div class="container">

<div class="glass">

<h1>23 MAY</h1>

<p class="subtitle">
Every Second Brings You Closer...
</p>

<div class="countdown">

<div class="box">
<div id="months" class="number">00</div>
<div class="label">Months</div>
</div>

<div class="box">
<div id="days" class="number">00</div>
<div class="label">Days</div>
</div>

<div class="box">
<div id="hours" class="number">00</div>
<div class="label">Hours</div>
</div>

<div class="box">
<div id="minutes" class="number">00</div>
<div class="label">Minutes</div>
</div>

<div class="box">
<div id="seconds" class="number">00</div>
<div class="label">Seconds</div>
</div>

</div>

<div class="progress">

<div class="progress-ring">

<svg width="180" height="180">

<circle
cx="90"
cy="90"
r="80"
class="track"/>

<circle
cx="90"
cy="90"
r="80"
class="bar"
id="progressCircle"/>

</svg>

<div class="center-text">

<span id="percent">
0%
</span>

<small>Year Passed</small>

</div>

</div>

</div>

<div class="footer">

Next Target

<br>

<b>23 MAY</b>

</div>

</div>

</div>

<script src="script.js"></script>

<script>

if("serviceWorker" in navigator){

navigator.serviceWorker.register("service-worker.js");

}

</script>

</body>

</html>
