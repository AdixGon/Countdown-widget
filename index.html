<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown to 23 May</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    radial-gradient(circle at top,#1f2937,#09090b 70%);
    overflow:hidden;
}

/* Background Glow */
body::before{
    content:"";
    position:absolute;
    width:550px;
    height:550px;
    background:#00d4ff;
    filter:blur(180px);
    opacity:.18;
    border-radius:50%;
    animation:float 8s ease-in-out infinite;
}

@keyframes float{
    50%{
        transform:translateY(-40px);
    }
}

.card{
    position:relative;
    width:900px;
    max-width:95%;
    padding:50px;
    border-radius:28px;
    background:rgba(255,255,255,.05);
    backdrop-filter:blur(25px);
    border:1px solid rgba(255,255,255,.1);
    box-shadow:
    0 20px 60px rgba(0,0,0,.45),
    inset 0 1px 1px rgba(255,255,255,.08);
    text-align:center;
}

h1{
    color:#fff;
    font-size:2.5rem;
    font-weight:700;
    letter-spacing:2px;
}

.subtitle{
    margin-top:10px;
    color:#9ca3af;
    font-size:15px;
}

.timer{
    margin-top:45px;
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:18px;
}

.box{
    padding:25px 10px;
    border-radius:20px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.08);
    transition:.35s;
}

.box:hover{
    transform:translateY(-8px);
    background:rgba(255,255,255,.09);
}

.number{
    font-size:3rem;
    font-weight:700;
    color:#fff;
    text-shadow:0 0 15px rgba(0,212,255,.35);
}

.label{
    margin-top:8px;
    color:#9ca3af;
    font-size:.85rem;
    text-transform:uppercase;
    letter-spacing:2px;
}

.footer{
    margin-top:35px;
    color:#6b7280;
    font-size:13px;
}

@media(max-width:768px){

.timer{
grid-template-columns:repeat(2,1fr);
}

.number{
font-size:2.2rem;
}

h1{
font-size:2rem;
}
}
</style>
</head>

<body>

<div class="card">

<h1>23 MAY COUNTDOWN</h1>

<div class="subtitle">
Every second brings you closer...
</div>

<div class="timer">

<div class="box">
<div class="number" id="months">0</div>
<div class="label">Months</div>
</div>

<div class="box">
<div class="number" id="days">0</div>
<div class="label">Days</div>
</div>

<div class="box">
<div class="number" id="hours">0</div>
<div class="label">Hours</div>
</div>

<div class="box">
<div class="number" id="minutes">0</div>
<div class="label">Minutes</div>
</div>

<div class="box">
<div class="number" id="seconds">0</div>
<div class="label">Seconds</div>
</div>

</div>

<div class="footer">
Designed with a clean cinematic glassmorphism style ✨
</div>

</div>

<script>

function updateCountdown(){

const now=new Date();

let target=new Date(now.getFullYear(),4,23,0,0,0);

if(now>target){
target=new Date(now.getFullYear()+1,4,23,0,0,0);
}

let diff=target-now;

let totalSeconds=Math.floor(diff/1000);

let months=Math.floor(totalSeconds/(60*60*24*30));
let days=Math.floor(totalSeconds/(60*60*24))%30;
let hours=Math.floor(totalSeconds/(60*60))%24;
let minutes=Math.floor(totalSeconds/60)%60;
let seconds=totalSeconds%60;

document.getElementById("months").innerHTML=months;
document.getElementById("days").innerHTML=days;
document.getElementById("hours").innerHTML=hours;
document.getElementById("minutes").innerHTML=minutes;
document.getElementById("seconds").innerHTML=seconds;

if(diff<=0){
document.querySelector(".card").innerHTML="<h1>🎉 Happy 23 May!</h1>";
}

}

updateCountdown();
setInterval(updateCountdown,1000);

</script>

</body>
</html>
